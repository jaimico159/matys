{{ define "hero" }}
<section class="relative h-72 flex items-center justify-center overflow-hidden"
         x-data="{ current: 0 }"
         x-init="setInterval(() => { current = (current + 1) % 3 }, 5000)">

  <div class="absolute inset-0">
    <div class="absolute inset-0 bg-cover bg-center transition-opacity duration-[1200ms]"
         :class="current === 0 ? 'opacity-100' : 'opacity-0'"
         style="background-image: url('/assets/images/aqp1.jpg')"></div>
    <div class="absolute inset-0 bg-cover bg-center transition-opacity duration-[1200ms]"
         :class="current === 1 ? 'opacity-100' : 'opacity-0'"
         style="background-image: url('/assets/images/aqp2.jpg')"></div>
    <div class="absolute inset-0 bg-cover bg-center transition-opacity duration-[1200ms]"
         :class="current === 2 ? 'opacity-100' : 'opacity-0'"
         style="background-image: url('/assets/images/aqp3.jpg')"></div>
  </div>
  <div class="absolute inset-0 bg-blue-950/70"></div>

  <div class="relative z-10 text-center text-white px-4">
    <h1 class="text-4xl font-bold mb-2">Promociones</h1>
    <p class="text-blue-200 text-lg">Matys Laundry &middot; Arequipa, Perú</p>
  </div>
</section>
{{ end }}

{{ define "main" }}
<section class="py-28 px-4 sm:px-6 text-center">
  <div class="max-w-xl mx-auto">
    <div class="w-16 h-16 bg-amber-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
      </svg>
    </div>
    <h2 class="text-2xl font-bold text-slate-900 mb-3">Pronto habrá promociones</h2>
    <p class="text-slate-500 mb-8 leading-relaxed">
      Próximamente tendremos ofertas especiales para nuestros clientes.
      Contáctanos por WhatsApp para estar al tanto de las novedades.
    </p>
    <a href="https://wa.me/51995577941?text=Puedes%20darme%20más%20información?"
       target="_blank" rel="noopener noreferrer"
       class="inline-flex items-center gap-2 bg-amber-500 hover:bg-amber-600 text-white font-bold px-6 py-3 rounded-xl transition-all hover:-translate-y-0.5 shadow-lg">
      <img src="/assets/images/wssp-icon.png" alt="" width="18" height="18" />
      Contactar por WhatsApp
    </a>
  </div>
</section>
{{ end }}
