{{ define "main" }}
<section class="page-hero">
  <div class="container page-hero__inner">
    <p class="eyebrow">Sobre nosotros</p>
    <h1>{{ .Title }}</h1>
  </div>
</section>

<section class="section">
  <div class="container about about--single">
    <figure class="about__media">
      <img
        src="{{ "/assets/images/matysfinal.jpg" | relURL }}"
        alt="Local de Matys Laundry en Arequipa"
        loading="lazy"
      />
    </figure>
    <div class="about__content">
      {{ .Content | safeHTML }}
    </div>
  </div>
</section>
{{ end }}
