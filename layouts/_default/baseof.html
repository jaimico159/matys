<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    {{ $desc := .Description | default .Site.Params.description }}
    <meta name="description" content="{{ $desc }}" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{ .Permalink }}" />

    <!-- Open Graph -->
    <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}" />
    <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Matys Laundry{{ end }}" />
    <meta property="og:description" content="{{ $desc }}" />
    <meta property="og:url" content="{{ .Permalink }}" />
    <meta property="og:image" content="{{ .Site.Params.ogImage }}" />
    <meta property="og:locale" content="es_PE" />
    <meta property="og:site_name" content="Matys Laundry" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Matys Laundry{{ end }}" />
    <meta name="twitter:description" content="{{ $desc }}" />
    <meta name="twitter:image" content="{{ .Site.Params.ogImage }}" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <link rel="stylesheet" href="/assets/css/styles.css" />

    <!-- Schema.org -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LaundryService",
        "name": "Matys Laundry",
        "description": "Matys Laundry ofrece servicios de lavado, secado y planchado en Arequipa, Perú. Laundry service in Arequipa, Peru.",
        "image": "https://matyslaundry.com/assets/images/matysfinal.jpg",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Calle Jerusalén 519",
          "addressLocality": "Arequipa",
          "addressRegion": "Arequipa",
          "postalCode": "04001",
          "addressCountry": "PE"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": -16.393984,
          "longitude": -71.53321
        },
        "telephone": "+51995577941",
        "email": "matyslaundry@gmail.com",
        "url": "https://matyslaundry.com",
        "openingHours": ["Mo-Sa 08:00-20:00"],
        "priceRange": "S/",
        "currenciesAccepted": "PEN",
        "paymentAccepted": "Cash",
        "hasMap": "https://maps.app.goo.gl/N3HxF7iBgk5y2L1dA"
      }
    </script>

    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Matys Laundry{{ end }}</title>
  </head>
  <body class="font-sans bg-white text-slate-800 antialiased">

    <!-- WhatsApp floating button -->
    <a href="https://wa.me/51995577941?text=Puedes%20darme%20más%20información?"
       style="position:fixed;bottom:1.5rem;right:1.5rem;width:56px;height:56px;background-color:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,0.45);z-index:9999;transition:transform .2s,box-shadow .2s;"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="Contactar por WhatsApp">
      <img src="/assets/images/wssp-icon.png" alt="WhatsApp" width="28" height="28" />
    </a>

    {{ partial "nav.html" . }}
    {{ block "hero" . }}{{ end }}
    {{ block "main" . }}{{ end }}
    {{ partial "footer.html" . }}

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

    <!-- Google Maps -->
    <script async defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2HWb9ONtj2U-gtaVe1SNzCxiQC0wFnQ0&loading=async&callback=initMap&libraries=marker">
    </script>
    <script>
      function initMap() {
        var pos = { lat: -16.393984, lng: -71.53321 };
        var map = new google.maps.Map(document.getElementById("map"), {
          zoom: 17,
          center: pos,
        });
        var marker = new google.maps.Marker({
          position: pos,
          map: map,
          title: "Matys Laundry",
        });
        marker.addListener("click", () => {
          window.open("https://maps.app.goo.gl/N3HxF7iBgk5y2L1dA");
        });
      }
    </script>
  </body>
</html>
