<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    {{ $desc := .Description | default .Site.Params.description }}
    <meta name="description" content="{{ $desc }}" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{ .Permalink }}" />

    <!-- Open Graph -->
    <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}" />
    <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Matys Laundry{{ end }}" />
    <meta property="og:description" content="{{ $desc }}" />
    <meta property="og:url" content="{{ .Permalink }}" />
    <meta property="og:image" content="{{ .Site.Params.ogImage }}" />
    <meta property="og:locale" content="es_PE" />
    <meta property="og:site_name" content="Matys Laundry" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Matys Laundry{{ end }}" />
    <meta name="twitter:description" content="{{ $desc }}" />
    <meta name="twitter:image" content="{{ .Site.Params.ogImage }}" />

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/materialize/css/materialize.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/font-awesome.min.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LaundryService",
        "name": "Matys Laundry",
        "description": "Matys Laundry ofrece servicios de lavado, secado y planchado en Arequipa, Perú. Laundry service in Arequipa, Peru.",
        "image": "https://matyslaundry.com/assets/images/matysfinal.jpg",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Calle Jerusalén 519",
          "addressLocality": "Arequipa",
          "addressRegion": "Arequipa",
          "postalCode": "04001",
          "addressCountry": "PE"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": -16.393984,
          "longitude": -71.53321
        },
        "telephone": "+51995577941",
        "email": "matyslaundry@gmail.com",
        "url": "https://matyslaundry.com",
        "openingHours": ["Mo-Sa 08:00-20:00"],
        "priceRange": "S/",
        "currenciesAccepted": "PEN",
        "paymentAccepted": "Cash",
        "hasMap": "https://maps.app.goo.gl/N3HxF7iBgk5y2L1dA"
      }
    </script>
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Matys Laundry{{ end }}</title>
  </head>
  <body>
    <a
      href="https://wa.me/51995577941?text=Puedes%20darme%20más%20información?"
      class="float bounce"
      target="_blank"
    >
      <img
        src="/assets/images/wssp-icon.png"
        alt="whatsapp"
        width="60"
        height="60"
      />
    </a>
    {{ block "header" . }}{{ end }} {{ block "nav" . }}{{ end }}
    <div class="divider"></div>
    {{ block "slider" . }}{{ end }} {{ block "main" . }}{{ end }}
    <script type="text/javascript" src="/assets/js/jquery-3.2.1.js"></script>
    <script src="/materialize/js/materialize.min.js"></script>
    <script>
      $(document).ready(function () {
        $(".sidenav").sidenav();
        $(".slider").slider();
        $(".carousel").carousel();
        $(".scrollspy").scrollSpy();
      });
    </script>
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2HWb9ONtj2U-gtaVe1SNzCxiQC0wFnQ0&loading=async&callback=initMap&libraries=marker"
    ></script>
    <script>
      function initMap() {
        var uluru = { lat: -16.393984, lng: -71.53321 };
        var map = new google.maps.Map(document.getElementById("map"), {
          zoom: 17,
          center: uluru,
        });
        var marker = new google.maps.Marker({
          position: uluru,
          map: map,
          title: "Matys Laundry",
        });
        marker.addListener("click", () => {
          window.open("https://maps.app.goo.gl/N3HxF7iBgk5y2L1dA");
        });
      }
    </script>
  </body>
</html>
