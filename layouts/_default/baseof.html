<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="description"
      content="{{ with .Params.seoDescription }}{{ . }}{{ else }}{{ with .Description }}{{ . }}{{ else }}Matys Laundry ofrece soluciones rápidas y cuidadosas de lavado y planchado en Arequipa. ¡Agenda tu servicio hoy!{{ end }}{{ end }}"
    />
    <meta name="theme-color" content="#1f2560" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Matys Laundry",
        "description": "Matys Laundry ofrece servicios rápidos y económicos de lavado y planchado en Arequipa, Perú.",
        "image": "https://matyslaundry.com/assets/images/matysfinal.jpg",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Calle Jerusalén 519",
          "addressLocality": "Arequipa",
          "addressRegion": "Arequipa",
          "postalCode": "04001",
          "addressCountry": "PE"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": -16.393984,
          "longitude": -71.53321
        },
        "telephone": "+51 995 577 941",
        "url": "https://matyslaundry.com",
        "openingHours": "Mo-Sa 08:00-20:00"
      }
    </script>
    <title>{{ .Title }}</title>
  </head>
  <body class="site">
    <a
      href="https://wa.me/51995577941?text=Puedes%20darme%20más%20información?"
      class="contact-fab"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Escríbenos por WhatsApp"
    >
      <img
        src="/assets/images/wssp-icon.png"
        alt="WhatsApp"
        width="56"
        height="56"
      />
    </a>
    {{ block "site_header" . }}{{ partial "site-header.html" . }}{{ end }}
    <main id="content" class="site-main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ block "site_footer" . }}{{ partial "footer.html" . }}{{ end }}
    <script type="module" src="/assets/js/site.js"></script>
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2HWb9ONtj2U-gtaVe1SNzCxiQC0wFnQ0&loading=async&callback=initMap&libraries=marker"
    ></script>
  </body>
</html>
