<header x-data="{ open: false }" class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-slate-200 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-2 font-bold text-xl tracking-tight text-blue-900">
      <span class="text-amber-500 text-2xl leading-none">✦</span>
      Matys Laundry
    </a>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-1 text-sm font-medium">
      <a href="/"
         class="{{ if .IsHome }}text-blue-700 bg-blue-50{{ else }}text-slate-600 hover:text-slate-900 hover:bg-slate-50{{ end }} px-3 py-2 rounded-lg transition-colors">
        Inicio
      </a>
      <a href="/acerca/"
         class="{{ if eq .Section `acerca` }}text-blue-700 bg-blue-50{{ else }}text-slate-600 hover:text-slate-900 hover:bg-slate-50{{ end }} px-3 py-2 rounded-lg transition-colors">
        Nosotros
      </a>
      <a href="/servicios/"
         class="{{ if eq .Section `servicios` }}text-blue-700 bg-blue-50{{ else }}text-slate-600 hover:text-slate-900 hover:bg-slate-50{{ end }} px-3 py-2 rounded-lg transition-colors">
        Servicios
      </a>
      <a href="https://wa.me/51995577941"
         target="_blank" rel="noopener noreferrer"
         class="ml-3 bg-amber-500 hover:bg-amber-600 text-white font-semibold px-4 py-2 rounded-lg transition-colors">
        Contactar
      </a>
    </nav>

    <!-- Mobile hamburger -->
    <button @click="open = !open"
            class="md:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors"
            aria-label="Abrir menú">
      <svg x-show="!open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      <svg x-show="open" x-cloak class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Mobile menu -->
  <div x-show="open" x-cloak
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 -translate-y-1"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-1"
       class="md:hidden border-t border-slate-200 bg-white shadow-lg">
    <nav class="max-w-6xl mx-auto px-4 py-3 flex flex-col gap-1 text-sm font-medium">
      <a href="/" class="px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50">Inicio</a>
      <a href="/acerca/" class="px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50">Nosotros</a>
      <a href="/servicios/" class="px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50">Servicios</a>
      <div class="pt-2 pb-1">
        <a href="https://wa.me/51995577941"
           target="_blank" rel="noopener noreferrer"
           class="flex items-center justify-center gap-2 bg-amber-500 hover:bg-amber-600 text-white font-semibold px-4 py-2.5 rounded-lg transition-colors">
          <img src="/assets/images/wssp-icon.png" alt="" width="18" height="18" />
          Contactar por WhatsApp
        </a>
      </div>
    </nav>
  </div>
</header>
