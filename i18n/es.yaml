# Services — Lavado
lavado_title: "Lavado"
lavado_p1: "Existen varios tipos de lavado. En Matys lo resumimos en dos: el lavado en agua (el más conocido) y el lavado en seco (para prendas especiales)."
lavado_p2: "El proceso de lavado es diferente al que uno hace en casa. Separamos la ropa blanca de la de color, por grado de suciedad, por material, y otros aspectos que prolongan la vida útil de tus prendas."
lavado_agua_title: "Lavado en Agua"
lavado_agua_p1: "El lavado en agua es el más conocido. Muchas personas no saben cómo programar la lavadora correctamente para distintos tipos de ropa, lo que reduce la vida útil de las prendas."
lavado_agua_p2: "En Matys nos encargamos de ese proceso para que tu ropa conserve su color y quede limpia sin maltratarla."
lavado_seco_title: "Lavado en Seco"
lavado_seco_p1: "El lavado en seco es para prendas que no pueden lavarse con métodos comunes porque su material es delicado."
lavado_seco_p2: "Es un proceso especial donde utilizamos los insumos adecuados. Tú no tienes que preocuparte de esas cosas — eso está en nuestras manos."
lavado_ternos_title: "Lavado de Ternos"
lavado_ternos_p1: "Los trajes y ternos son de los que más atendemos. Dependiendo del material se utiliza lavado en agua o lavado en seco. También entran en esta categoría sacos, blazers y ropa de vestir elegante."
lavado_ternos_p2: "Un buen cuidado determina el tiempo que dura la prenda."
lavado_abrigos_title: "Lavado de Abrigos"
lavado_abrigos_p1: "Lavamos distintos tipos de abrigos mediante lavado en seco o en agua, de acuerdo al material."
lavado_abrigos_p2: "Estas prendas requieren de mucho cuidado para que duren bastante tiempo. Nosotros haremos este trabajo para que puedas tener tu prenda por más tiempo."
lavado_vestidos_title: "Lavado de Vestidos"
lavado_vestidos_p1: "Lavamos distintos tipos de vestidos de acuerdo al material: vestidos de novia, vestidos de fiesta o vestidos simples, todos con cuidado especial."
lavado_vestidos_p2: "Al igual que los ternos o los abrigos, tienen un tratamiento especial ya sea al vapor o en agua."
lavado_cuero_title: "Lavado de Casacas de Cuero"
lavado_cuero_p1: "Las casacas de cuero son un poco difíciles de lavar. Tenemos los recursos necesarios para este trabajo."
lavado_cuero_p2: "Haz que tus casacas de cuero estén en buen estado — tráelas a Matys y nosotros nos encargamos."
lavado_corbatas_title: "Lavado de Corbatas"
lavado_corbatas_p1: "Las corbatas se ensucian muy rápido y son difíciles de lavar. Tenemos la opción de lavarlas con el cuidado adecuado."
lavado_corbatas_p2: "Mantén tus corbatas limpias y en buen estado para utilizarlas en momentos especiales."

# Services — Planchado
planchado_title: "Planchado"
planchado_p1: "El planchado es importante para cierto tipo de ropa. Según el tipo de tela se usan diferentes temperaturas, y no es una plancha común sino una planchadora industrial especializada."
planchado_p2: "Hay ropa que se arruga fácilmente y requiere planchado a temperaturas bajas, y hay ropa que <strong>no</strong> requiere planchado."
planchado_p3: "Nosotros nos encargamos de clasificarlas — solo necesitas traer las prendas."
planchado_normal_title: "Planchado Normal"
planchado_normal_p1: "El planchado normal es el planchado sin usar vapor. Con nuestra plancha industrial podemos regular la temperatura con precisión."
planchado_normal_p2: "Hay ropas que requieren este tipo de planchado para verse mejor."
planchado_vapor_title: "Planchado al Vapor"
planchado_vapor_p1: "El planchado al vapor es un tipo especial. Se debe regular la temperatura y el nivel de vapor de acuerdo al tipo de tela."
planchado_vapor_p2: "Se realiza con el mismo equipo industrial pero utilizando la función de vapor para mejores resultados en ciertas prendas."

# Privacy policy
privacy_title: "Política de Privacidad"
privacy_subtitle: "Cómo usamos y protegemos tu información"
privacy_last_updated: "Última actualización"
privacy_updated_date: "8 de abril de 2025"
privacy_s1_title: "Responsable del tratamiento"
privacy_s1_body: "<strong>Matys Laundry</strong> (en adelante «nosotros» o «la empresa»), con establecimiento en Calle Jerusalén 519, Arequipa, Perú, y correo electrónico matyslaundry@gmail.com, es responsable del tratamiento de los datos personales que nos facilitas."
privacy_s2_title: "Datos que recopilamos"
privacy_s2_intro: "Recopilamos únicamente los datos que tú nos proporcionas de forma voluntaria a través de los siguientes canales:"
privacy_s2_item1: "Nombre o alias cuando nos contactas."
privacy_s2_item2: "Número de teléfono al enviarnos un mensaje por WhatsApp."
privacy_s2_item3: "Correo electrónico si te comunicas por ese medio."
privacy_s2_item4: "El contenido de los mensajes que intercambiamos para gestionar tu pedido."
privacy_s3_title: "Finalidad del tratamiento"
privacy_s3_intro: "Utilizamos tus datos exclusivamente para:"
privacy_s3_item1: "Responder a tus consultas y cotizaciones."
privacy_s3_item2: "Gestionar y coordinar el servicio de lavandería que solicitas."
privacy_s3_item3: "Enviarte notificaciones relacionadas con tu pedido (confirmación, entrega, etc.)."
privacy_s4_title: "Base legal"
privacy_s4_body: "El tratamiento de tus datos se basa en el consentimiento que otorgas al contactarnos voluntariamente, así como en la ejecución del servicio que solicitas, conforme a la Ley N.° 29733 (Ley de Protección de Datos Personales) del Perú."
privacy_s5_title: "Compartición de datos con terceros"
privacy_s5_body: "No vendemos, alquilamos ni cedemos tus datos personales a terceros con fines comerciales. Tus datos pueden ser procesados únicamente por <strong>Meta Platforms, Inc.</strong> en su calidad de proveedor de la plataforma WhatsApp, conforme a su propia <a href=\"https://www.whatsapp.com/legal/privacy-policy\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"text-blue-700 hover:underline\">Política de Privacidad</a>."
privacy_s6_title: "Uso de WhatsApp (Meta)"
privacy_s6_body: "Utilizamos WhatsApp Business para comunicarnos contigo. Al enviarnos un mensaje por WhatsApp, aceptas las <a href=\"https://www.whatsapp.com/legal/terms-of-service\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"text-blue-700 hover:underline\">Condiciones del Servicio</a> y la <a href=\"https://www.whatsapp.com/legal/privacy-policy\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"text-blue-700 hover:underline\">Política de Privacidad</a> de WhatsApp/Meta. Nosotros solo utilizamos esos mensajes para gestionar tu pedido y no los compartimos con terceros."
privacy_s7_title: "Retención de datos"
privacy_s7_body: "Conservamos tus datos durante el tiempo necesario para prestar el servicio solicitado y por un período máximo de 12 meses adicionales para resolver posibles consultas o reclamaciones. Transcurrido ese plazo, los datos serán eliminados o anonimizados."
privacy_s8_title: "Tus derechos"
privacy_s8_intro: "Como titular de tus datos personales tienes derecho a:"
privacy_s8_item1: "Acceder a los datos que tenemos sobre ti."
privacy_s8_item2: "Rectificar datos inexactos o incompletos."
privacy_s8_item3: "Solicitar la eliminación de tus datos."
privacy_s8_item4: "Oponerte al tratamiento o solicitar su limitación."
privacy_s8_contact: "Para ejercer cualquiera de estos derechos, escríbenos a <a href=\"mailto:matyslaundry@gmail.com\" class=\"text-blue-700 hover:underline\">matyslaundry@gmail.com</a> o por WhatsApp al (+51) 995 577 941."
privacy_s9_title: "Seguridad"
privacy_s9_body: "Adoptamos medidas razonables para proteger tu información frente a accesos no autorizados, pérdida o divulgación. Sin embargo, ninguna transmisión de datos por internet puede garantizarse como 100% segura."
privacy_s10_title: "Cambios a esta política"
privacy_s10_body: "Podemos actualizar esta Política de Privacidad periódicamente. Cualquier cambio será publicado en esta misma página con la fecha de actualización correspondiente. Te recomendamos revisar esta página ocasionalmente."
privacy_s11_title: "Contacto"
privacy_s11_intro: "Si tienes preguntas sobre esta política o sobre el tratamiento de tus datos, puedes contactarnos a través de:"
