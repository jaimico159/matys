# Services — Wash
lavado_title: "Washing"
lavado_p1: "There are several types of washing. At Matys we summarize them in two: water washing (the most common) and dry cleaning (for special garments)."
lavado_p2: "Our washing process is different from what you do at home. We separate whites from colors, by level of dirt, by material, and other factors that extend the life of your clothes."
lavado_agua_title: "Water Washing"
lavado_agua_p1: "Water washing is the most common method. Many people don't know how to set the washing machine correctly for different types of clothing, which shortens the life of garments."
lavado_agua_p2: "At Matys we handle that process so your clothes keep their color and come out clean without damage."
lavado_seco_title: "Dry Cleaning"
lavado_seco_p1: "Dry cleaning is for garments that cannot be washed with conventional methods because their material is delicate."
lavado_seco_p2: "It is a special process where we use the appropriate products. You don't have to worry about any of that — it's in our hands."
lavado_ternos_title: "Suits & Jackets"
lavado_ternos_p1: "Suits and blazers are among our most common requests. Depending on the material, we use water washing or dry cleaning. This category also includes sport coats, blazers and formal wear."
lavado_ternos_p2: "Good care determines how long a garment lasts."
lavado_abrigos_title: "Coats"
lavado_abrigos_p1: "We wash different types of coats using dry cleaning or water washing, depending on the material."
lavado_abrigos_p2: "These garments require a lot of care to last a long time. We will do this work so you can keep your coat in great condition for longer."
lavado_vestidos_title: "Dresses"
lavado_vestidos_p1: "We wash different types of dresses according to their material: wedding dresses, evening gowns or casual dresses, all with special care."
lavado_vestidos_p2: "Like suits and coats, they receive special treatment either with steam or water."
lavado_cuero_title: "Leather Jackets"
lavado_cuero_p1: "Leather jackets are tricky to clean. We have the right resources for this job."
lavado_cuero_p2: "Keep your leather jackets in great shape — bring them to Matys and we'll take care of them."
lavado_corbatas_title: "Ties"
lavado_corbatas_p1: "Ties get dirty quickly and are difficult to clean. We offer this service with the proper care."
lavado_corbatas_p2: "Keep your ties clean and in good condition for special occasions."

# Services — Ironing
planchado_title: "Ironing"
planchado_p1: "Ironing is important for certain types of clothing. Different temperatures are used depending on the fabric — and we use a specialized industrial iron, not a household one."
planchado_p2: "Some clothes wrinkle easily and need ironing at low temperatures, and some clothes do <strong>not</strong> need ironing at all."
planchado_p3: "We handle the classification — you just need to bring the garments."
planchado_normal_title: "Standard Ironing"
planchado_normal_p1: "Standard ironing is done without steam. With our industrial iron we can regulate the temperature precisely."
planchado_normal_p2: "Some garments require this type of ironing to look their best."
planchado_vapor_title: "Steam Ironing"
planchado_vapor_p1: "Steam ironing is a special type. Temperature and steam level must be adjusted according to the fabric type."
planchado_vapor_p2: "It uses the same industrial equipment but with the steam function enabled for better results on certain garments."

# Privacy policy
privacy_title: "Privacy Policy"
privacy_subtitle: "How we use and protect your information"
privacy_last_updated: "Last updated"
privacy_updated_date: "April 8, 2025"
privacy_s1_title: "Data controller"
privacy_s1_body: "<strong>Matys Laundry</strong> (hereinafter \"we\" or \"the company\"), located at Calle Jerusalén 519, Arequipa, Peru, email matyslaundry@gmail.com, is the data controller for the personal information you provide to us."
privacy_s2_title: "Data we collect"
privacy_s2_intro: "We only collect data that you voluntarily provide through the following channels:"
privacy_s2_item1: "Your name or alias when you contact us."
privacy_s2_item2: "Your phone number when you message us on WhatsApp."
privacy_s2_item3: "Your email address if you contact us by email."
privacy_s2_item4: "The content of messages we exchange to manage your order."
privacy_s3_title: "Purpose of processing"
privacy_s3_intro: "We use your data exclusively to:"
privacy_s3_item1: "Respond to your inquiries and quotes."
privacy_s3_item2: "Manage and coordinate the laundry service you request."
privacy_s3_item3: "Send you notifications related to your order (confirmation, pickup, delivery, etc.)."
privacy_s4_title: "Legal basis"
privacy_s4_body: "Processing is based on the consent you give by voluntarily contacting us, and on the performance of the service you request, in accordance with Peru's Law No. 29733 (Personal Data Protection Law)."
privacy_s5_title: "Sharing data with third parties"
privacy_s5_body: "We do not sell, rent, or share your personal data with third parties for commercial purposes. Your data may be processed solely by <strong>Meta Platforms, Inc.</strong> as the provider of the WhatsApp platform, under their own <a href=\"https://www.whatsapp.com/legal/privacy-policy\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"text-blue-700 hover:underline\">Privacy Policy</a>."
privacy_s6_title: "Use of WhatsApp (Meta)"
privacy_s6_body: "We use WhatsApp Business to communicate with you. By messaging us on WhatsApp, you agree to WhatsApp/Meta's <a href=\"https://www.whatsapp.com/legal/terms-of-service\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"text-blue-700 hover:underline\">Terms of Service</a> and <a href=\"https://www.whatsapp.com/legal/privacy-policy\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"text-blue-700 hover:underline\">Privacy Policy</a>. We only use those messages to manage your order and do not share them with third parties."
privacy_s7_title: "Data retention"
privacy_s7_body: "We retain your data for as long as necessary to provide the requested service, plus a maximum of 12 additional months to resolve any queries or complaints. After that period, data will be deleted or anonymized."
privacy_s8_title: "Your rights"
privacy_s8_intro: "As the owner of your personal data, you have the right to:"
privacy_s8_item1: "Access the data we hold about you."
privacy_s8_item2: "Correct inaccurate or incomplete data."
privacy_s8_item3: "Request deletion of your data."
privacy_s8_item4: "Object to processing or request its restriction."
privacy_s8_contact: "To exercise any of these rights, write to us at <a href=\"mailto:matyslaundry@gmail.com\" class=\"text-blue-700 hover:underline\">matyslaundry@gmail.com</a> or on WhatsApp at (+51) 995 577 941."
privacy_s9_title: "Security"
privacy_s9_body: "We take reasonable measures to protect your information against unauthorized access, loss, or disclosure. However, no internet data transmission can be guaranteed as 100% secure."
privacy_s10_title: "Changes to this policy"
privacy_s10_body: "We may update this Privacy Policy periodically. Any changes will be published on this page with the corresponding update date. We recommend checking this page occasionally."
