# Services — Special Washes
especiales_title: "Special Washes"
especiales_p1: "At Matys we don't just wash clothing. We also offer washing of other materials: bed linen, duvets, curtains, blinds and more."
especiales_p2: "Below we describe the specific special wash services we offer."
ropa_cama_title: "Bed Linen"
ropa_cama_p1: "We wash many types of materials, and bed linen is no exception."
ropa_cama_p2: "Bed linen washing covers quilts, sheets, bedspreads, blankets and similar items."
edredones_title: "Duvets"
edredones_p1: "Duvets are not easy to wash at home due to their size and material. That's why we offer this special wash to keep them in perfect condition."
cortinas_title: "Curtains"
cortinas_p1: "Curtains are in the special washes section because they are generally large and come in different materials: delicate, thick, thin, blackout and more."
tapasoles_title: "Blackout Blinds"
tapasoles_p1: "Blackout blinds are very thick curtains designed to completely block sunlight. Their special material requires a specific washing process."
peluches_title: "Stuffed Animals"
peluches_p1: "Do you have stuffed animals you want to keep clean? Are they special gifts you received?"
peluches_p2: "We also offer stuffed animal washing so you can keep them in good condition or simply get them cleaned."
